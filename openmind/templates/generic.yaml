# Open Mind template profile — schema 1.1.0
#
# A template profile is a declarative "lens" for a repository: how to match a
# stack, which logical roles files play, which extra deterministic facts to
# capture, and how a guided learning doc should be organised. Copy this file to
# <data dir>/templates/<your-name>.yaml to author your own (user files override
# built-ins by name). Templates are data, never code: everything they produce
# must stay deterministic and carry file:line evidence — a pattern that matches
# nothing yields an honest empty section, never invented content.
#
# This 'generic' profile is the neutral baseline: its match section is empty so
# it is NEVER auto-selected, and selecting it changes nothing — it exists as
# the annotated authoring example.

schemaVersion: "1.1.0"
name: generic
title: Generic (no framework lens)
description: Neutral baseline — behaves exactly like having no template selected.

# match — how auto-selection scores this profile against the learned repo.
# Scoring: each matched dependency pattern +3, primary language +2 (other
# listed language +1), each matched marker-file glob +2. The profile is
# auto-selected only when its total reaches min_score (default 3, so one
# dependency cue alone is enough; language or markers alone are not).
match:
  dependencies: []      # substring match against manifest dependencies,
                        # e.g. [spring-boot-starter, spring-webmvc]
  languages: []         # detected language names, e.g. [Java, Kotlin]
  marker_files: []      # repo-relative globs, e.g. ["src/main/resources/application*.yml"]
  # min_score: 3        # optional override of the auto-selection floor

# ---------------------------------------------------------------------------
# roles / facets — ACTIVE sections (schema 1.1): consumed by the learn
# pipeline (map/template_facts.json), the structure/graph API, and the
# .openmind export. See spring-boot.yaml for a fully worked example.
# ---------------------------------------------------------------------------

# roles — classify files into logical layers via matchers, checked in order
# (first matching role wins; within a role: annotations regex, then file-name
# glob, then path glob). Each role needs at least one matcher.
#   - name: controller            # lowercase slug (required)
#     title: Controllers          # display name
#     layer: 1                    # presentation order, 1 = outermost
#     annotations: ['@RestController\b']   # line regexes (must compile)
#     name_patterns: ["*Controller.java"]  # file-name globs
#     path_globs: ["*controllers/*"]       # repo-relative path globs
roles: []

# facets — deterministic line regexes whose capture groups become named,
# evidence-backed facts ({file, line, snippet} each). captures must name the
# groups 1:1; files (optional) limits which files are scanned.
#   - name: http_route
#     title: HTTP route
#     pattern: '@(Get|Post)Mapping\s*\(\s*"([^"]*)"'
#     captures: [method, path]
#     files: ["*.java"]
facets: []

# guide — RESERVED (shape-checked only): the outline of a generated learning
# document; each section is a query over the learned artifacts, rendered
# deterministically with honest "not found" for empty sections.
guide: []

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Deterministic and offline for every job: the hashing embedder instead of a
# downloaded model, and no enrichment or source-link egress. No job in this
# workflow may call a paid API or a public LLM endpoint.
env:
  OPENMIND_EMBED_OFFLINE: "1"
  OPENMIND_EMBED_DEVICE: cpu
  OPENMIND_INGEST_FREE_GPU: "0"
  OPENMIND_ENRICH_EGRESS: "0"
  OPENMIND_SOURCELINK_EGRESS: "0"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

jobs:
  # ---------------------------------------------------------------------------
  # The external integration contract, proven WITHOUT installing anything.
  # Keeping this job dependency-free IS the guarantee: an external consumer
  # (e.g. open-mind-mcp-server) can run the exporter with nothing but Python.
  # ---------------------------------------------------------------------------
  artifact-contract:
    name: Artifact export contract (stdlib-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Syntax-level build check across the whole package; imports nothing,
      # so it needs no dependencies from requirements.txt.
      - name: Byte-compile package
        run: python -m compileall -q openmind

      # tests/verify_artifacts.py is deliberately dependency-free (pure
      # stdlib + the deterministic extractors): it generates real artifacts
      # from fixtures/sample-repo into a temp dir and verifies the export
      # schema, evidence discipline, and determinism. This is the contract
      # that external consumers (e.g. open-mind-mcp-server) depend on.
      - name: Verify artifact export contract
        run: python tests/verify_artifacts.py

      # The CLI must reach that same contract with no dependencies installed.
      - name: CLI export reproduces the contract (stdlib-only)
        run: |
          python -m openmind.cli export \
            --repo ./fixtures/sample-repo \
            --output ./.ci-openmind \
            --json > export.json
          python - <<'PY'
          import json, pathlib
          summary = json.load(open("export.json"))
          assert summary["ok"] is True, summary
          assert summary["schemaVersion"] == "1.1.0", summary["schemaVersion"]
          manifest = json.load(open(".ci-openmind/manifest.json"))
          assert manifest["schemaVersion"] == "1.1.0", manifest
          assert manifest["generator"]["name"] == "open-mind", manifest
          for name in ("glossary.json", "architecture.json", "flows.json",
                       "source-index.json", "metadata.json"):
              assert pathlib.Path(".ci-openmind", name).is_file(), name
          print("artifact contract OK:", manifest["schemaVersion"])
          PY

  # ---------------------------------------------------------------------------
  # The full gate. Everything that must be green before main moves.
  # ---------------------------------------------------------------------------
  full-gate:
    name: Full gate (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile package
        run: python -m compileall -q openmind

      # Cheap, high-signal checks first, so an obvious breakage fails in
      # seconds instead of after the whole suite.
      - name: Migration tests
        run: python scripts/run_acceptance.py --only verify_migrations

      - name: Content-store tests
        run: python scripts/run_acceptance.py --only verify_content_store

      - name: Asset model tests
        run: python scripts/run_acceptance.py --only verify_asset_model

      - name: CLI tests (base + asset commands)
        run: python scripts/run_acceptance.py --only verify_cli --only verify_asset_cli

      - name: Asset adapter tests
        run: python scripts/run_acceptance.py --only verify_asset_adapters

      # -- document ingestion (v2 Phase 3) --------------------------------
      # Cheapest first again: the parser SPI and the parsers run in under a
      # second, so a broken probe or a regressed parser fails immediately
      # instead of after the ingest and CLI suites.
      - name: Document parser registry tests
        run: python scripts/run_acceptance.py --only verify_document_registry

      - name: Document parser tests
        run: python scripts/run_acceptance.py --only verify_document_parsers

      - name: Document security tests
        run: python scripts/run_acceptance.py --only verify_document_security

      - name: Document ingestion tests
        run: python scripts/run_acceptance.py --only verify_document_ingest

      - name: Document search tests
        run: python scripts/run_acceptance.py --only verify_document_search

      - name: Document CLI tests
        run: python scripts/run_acceptance.py --only verify_document_cli

      - name: Document adapter tests
        run: python scripts/run_acceptance.py --only verify_document_adapters

      # -- semantic plane (v2 Phase 4) ------------------------------------
      # No step below holds a provider credential and none may call a paid
      # or public model API: providers are tested through injected stub
      # transports and the deterministic mock provider.
      - name: Provider-profile tests
        run: python scripts/run_acceptance.py --only verify_semantic_profiles

      - name: Semantic-policy tests
        run: python scripts/run_acceptance.py --only verify_semantic_policy

      - name: Semantic-transport tests
        run: python scripts/run_acceptance.py --only verify_semantic_transport

      - name: Provider-adapter tests
        run: python scripts/run_acceptance.py --only verify_semantic_providers

      - name: Prompt-boundary tests
        run: python scripts/run_acceptance.py --only verify_semantic_prompts

      - name: Evidence-verifier tests
        run: python scripts/run_acceptance.py --only verify_semantic_verifier

      - name: Semantic-analysis tests
        run: python scripts/run_acceptance.py --only verify_semantic_analysis

      - name: Semantic-cache tests
        run: python scripts/run_acceptance.py --only verify_semantic_cache

      - name: Semantic-budget tests
        run: python scripts/run_acceptance.py --only verify_semantic_budget

      - name: Semantic-staleness tests
        run: python scripts/run_acceptance.py --only verify_semantic_staleness

      - name: Project-Lens tests
        run: python scripts/run_acceptance.py --only verify_project_lenses

      - name: Semantic CLI tests
        run: python scripts/run_acceptance.py --only verify_semantic_cli

      - name: Semantic adapter tests
        run: python scripts/run_acceptance.py --only verify_semantic_adapters

      # -- canonical knowledge graph (v2 Phase 5) ------------------------
      - name: Knowledge migration tests
        run: python scripts/run_acceptance.py --only verify_knowledge_migration

      - name: Knowledge entity tests
        run: python scripts/run_acceptance.py --only verify_knowledge_entities

      - name: Knowledge claim tests
        run: python scripts/run_acceptance.py --only verify_knowledge_claims

      - name: Knowledge relation tests
        run: python scripts/run_acceptance.py --only verify_knowledge_relations

      - name: Knowledge revision-ledger tests
        run: python scripts/run_acceptance.py --only verify_knowledge_revisions

      - name: Knowledge decision-audit tests
        run: python scripts/run_acceptance.py --only verify_knowledge_decisions

      - name: Candidate promotion tests
        run: python scripts/run_acceptance.py --only verify_knowledge_promotion

      - name: Deterministic projection tests
        run: python scripts/run_acceptance.py --only verify_knowledge_projection

      - name: Graph staleness tests
        run: python scripts/run_acceptance.py --only verify_knowledge_staleness

      - name: Entity merge/split tests
        run: python scripts/run_acceptance.py --only verify_knowledge_merge_split

      - name: Graph search tests
        run: python scripts/run_acceptance.py --only verify_knowledge_search

      - name: Graph traversal tests
        run: python scripts/run_acceptance.py --only verify_knowledge_graph

      - name: Knowledge Bundle 2.0 Draft tests (exporter + verifier)
        run: python scripts/run_acceptance.py --only verify_knowledge_bundle

      - name: Knowledge CLI tests
        run: python scripts/run_acceptance.py --only verify_knowledge_cli

      - name: Knowledge adapter tests (REST + 9 MCP tools + 35-tool gate)
        run: python scripts/run_acceptance.py --only verify_knowledge_adapters

      - name: No provider credential reaches CI
        run: |
          python - <<'PY'
          import os
          for name in ("OPENAI_API_KEY", "ANTHROPIC_API_KEY",
                       "AZURE_OPENAI_API_KEY"):
              assert not os.environ.get(name), f"{name} must not be set in CI"
          print("no provider credential present — semantic tests ran "
                "offline against stubs, as required")
          PY

      # The generated fixtures must regenerate to the same DOCUMENT, so an
      # "unchanged" document never mints a new Revision and the incremental
      # guarantee stays testable.
      #
      # The comparison differs by format, because the achievable guarantee does:
      #
      #   PDFs  - written byte by byte by the generator, no compressor involved,
      #           so they are compared as exact bytes.
      #   OOXML - a DOCX/XLSX is a DEFLATE archive, and the compressed bytes
      #           depend on the platform's zlib build. Comparing the container
      #           would fail on Linux for fixtures generated on Windows even
      #           when every part is identical. So the archive is unpacked and
      #           its member map is compared, which is the property that
      #           actually matters and catches real generator or library drift.
      - name: Document fixtures regenerate to identical content
        run: |
          python - <<'PY'
          import pathlib, subprocess, sys, zipfile

          FIXTURES = pathlib.Path("fixtures/documents")
          OOXML = {".docx", ".xlsx"}

          def content(path):
              if path.suffix.lower() in OOXML:
                  with zipfile.ZipFile(path) as zf:
                      return {i.filename: zf.read(i.filename)
                              for i in zf.infolist()}
              return path.read_bytes()

          before = {p.name: content(p) for p in sorted(FIXTURES.glob("sample-*"))}
          assert before, "no fixtures found"
          subprocess.run([sys.executable, "scripts/build_document_fixtures.py"],
                         check=True, capture_output=True)
          after = {p.name: content(p) for p in sorted(FIXTURES.glob("sample-*"))}

          problems = []
          for name, old in before.items():
              new = after.get(name)
              if new == old:
                  continue
              if isinstance(old, dict) and isinstance(new, dict):
                  # Name the exact differing part, so the failure is actionable
                  # rather than just "the bytes changed".
                  added = sorted(set(new) - set(old))
                  removed = sorted(set(old) - set(new))
                  changed = sorted(k for k in set(old) & set(new)
                                   if old[k] != new[k])
                  problems.append(f"{name}: added={added} removed={removed} "
                                  f"changed={changed}")
              else:
                  problems.append(f"{name}: bytes differ "
                                  f"({len(old)} -> {len(new or b'')})")
          assert not problems, "fixtures are not reproducible:\n  " + \
              "\n  ".join(problems)
          print("document fixtures reproducible:", len(before), "files "
                f"({sum(1 for n in before if n.endswith(tuple(OOXML)))} OOXML "
                "compared by member content, the rest byte for byte)")
          PY

      - name: MCP smoke test
        run: |
          python - <<'PY'
          import asyncio, os, tempfile
          os.environ["OPENMIND_DATA_DIR"] = tempfile.mkdtemp()
          os.environ["OPENMIND_MACHINE_DIR"] = tempfile.mkdtemp()
          from openmind import mcp_server
          from openmind.runtime import get_runtime

          # The nine core tools are a STABLE external contract; Phase 2 adds
          # read-only Asset tools, Phase 3 read-only document tools, Phase 4
          # read-only semantic/lens tools and Phase 5 read-only graph tools
          # ALONGSIDE them, never in place of one. 9+4+6+7+9 = 35, exactly.
          core = {"search", "route", "dispatch", "get_glossary",
                  "find_similar_cases", "save_case", "get_doc",
                  "propose_fix", "apply_fix"}
          asset = {"list_assets", "get_asset", "get_asset_revisions", "get_evidence"}
          document = {"list_documents", "get_document", "get_document_outline",
                      "search_documents", "search_knowledge",
                      "find_document_related_candidates"}
          semantic = {"list_semantic_runs", "get_semantic_run",
                      "list_semantic_candidates", "get_semantic_candidate",
                      "list_project_lenses", "get_project_lens",
                      "get_semantic_usage"}
          knowledge = {"get_graph_stats", "search_graph", "get_graph_node",
                       "expand_graph", "find_graph_path",
                       "list_engineering_entities", "get_engineering_entity",
                       "get_engineering_claim", "get_engineering_relation"}
          server = mcp_server.create_mcp_server(get_runtime())
          names = {t.name for t in asyncio.run(server.list_tools())}
          assert core <= names, f"core MCP tool missing: {core - names}"
          assert asset <= names, f"asset MCP tool missing: {asset - names}"
          assert document <= names, f"document MCP tool missing: {document - names}"
          assert semantic <= names, f"semantic MCP tool missing: {semantic - names}"
          assert knowledge <= names, f"graph MCP tool missing: {knowledge - names}"
          expected = core | asset | document | semantic | knowledge
          assert names == expected, f"unexpected MCP tools: {names ^ expected}"
          assert len(names) == 35, f"expected 35 tools, got {len(names)}"
          # No write/import tool: Phase 3 adds no document writer, Phase 4
          # nothing that configures providers or triggers paid analysis, and
          # Phase 5 nothing that promotes, creates, merges, changes
          # authority, seeds/syncs the graph or exports bundles.
          assert not {n for n in names
                      if n.startswith(("add_", "import_", "create_",
                                       "delete_", "update_", "set_",
                                       "start_", "approve_", "activate_",
                                       "review_", "configure_", "promote_",
                                       "merge_", "split_", "seed_", "sync_",
                                       "export_", "withdraw_"))}, names
          assert server.name == "open-mind", server.name
          print("MCP smoke OK:", len(names), "tools")
          PY

      - name: Skill bridge smoke test
        run: |
          python - <<'PY'
          import json, subprocess, sys
          proc = subprocess.Popen(
              [sys.executable, "-m", "openmind.skill_bridge",
               "--root", "./fixtures/sample-repo"],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, text=True, bufsize=1)
          try:
              ready = json.loads(proc.stdout.readline())
              assert ready.get("ready") is True, ready
              assert ready.get("files", 0) > 0, ready
              proc.stdin.write(json.dumps(
                  {"id": 1, "op": "route", "arg": "what does ISR mean"}) + "\n")
              proc.stdin.flush()
              reply = json.loads(proc.stdout.readline())
              assert reply.get("ok") is True, reply
              assert reply["result"]["capability"], reply
              print("skill bridge smoke OK:", ready["files"], "files")
          finally:
              proc.stdin.close()
              proc.wait(timeout=30)
          PY

      # The whole supported suite. Every tests/verify_*.py must be registered in
      # the runner's manifest, so a new test cannot go silently unrun, and a
      # skipped core script is counted as a failure rather than a pass.
      - name: Acceptance suite (core tier)
        run: python scripts/run_acceptance.py --json > acceptance.json

      - name: Upload acceptance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-report
          path: acceptance.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Cross-platform smoke. Deliberately light: no embedding-heavy ingest on three
  # operating systems, just proof that the package imports and the tool-first
  # entry points work everywhere.
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package imports
        run: python -c "import openmind; print('openmind', openmind.__version__)"

      - name: CLI --version
        run: python -m openmind.cli --version

      - name: CLI doctor --json
        shell: bash
        run: |
          python -m openmind.cli doctor --json > doctor.json
          python - <<'PY'
          import json
          report = json.load(open("doctor.json"))
          names = {c["name"] for c in report["checks"]}
          for required in ("data_dir", "database", "migrations", "project_dirs",
                           "vectorstore", "embeddings", "mcp", "runtime_version"):
              assert required in names, f"missing check: {required}"
          # A missing optional local model must never fail doctor.
          assert report["ok"] is True, report
          print("doctor OK:", report["version"], report["status"])
          PY

      - name: Artifact export contract
        run: python tests/verify_artifacts.py

      - name: Migration to v0006 + content-store byte round-trip
        shell: bash
        run: |
          python - <<'PY'
          import os, tempfile
          os.environ["OPENMIND_DATA_DIR"] = tempfile.mkdtemp()
          os.environ["OPENMIND_MACHINE_DIR"] = tempfile.mkdtemp()
          from openmind import db, content_store as cs
          db.init_db()
          assert db.migration_status()["version"] == 6, db.migration_status()
          conn = db._c()
          tables = {r[0] for r in conn.execute(
              "SELECT name FROM sqlite_master WHERE type='table'")}
          assert {"document_parses", "document_index"} <= tables, tables
          assert {"workspace_semantic_policies", "semantic_analysis_runs",
                  "semantic_candidates", "semantic_cache", "semantic_usage",
                  "project_lenses"} <= tables, tables
          assert {"engineering_entities", "engineering_claims",
                  "engineering_relations", "engineering_entity_aliases",
                  "engineering_entity_bindings", "knowledge_decisions",
                  "knowledge_revisions", "knowledge_promotions",
                  "knowledge_projection_state"} <= tables, tables
          assert "content_blob_hash" in {
              r[1] for r in conn.execute("PRAGMA table_info(segments)")}
          assert "payload_json" in {
              r[1] for r in conn.execute("PRAGMA table_info(jobs)")}
          # content-addressed blob byte round-trip + reuse + SHA-256 identity
          import hashlib
          data = b"phase2 content \x00\x01\x02 bytes"
          h = cs.put("p_smoke0000ci", data)
          assert h == hashlib.sha256(data).hexdigest()
          assert cs.put("p_smoke0000ci", data) == h          # reuse
          assert cs.get("p_smoke0000ci", h) == data          # round-trip
          print("migration v0005 + content-store round-trip OK:", h[:12])
          PY

      # -- semantic plane smoke (v2 Phase 4) ------------------------------
      # The mock provider drives one real analysis end-to-end on every OS:
      # machine-local profile, policy, analysis, verified candidate, exact
      # cache hit, staleness after a new revision, Built-in Lens projection
      # and organization-lens validation. Zero network, zero credentials.
      - name: Semantic plane smoke (mock provider, offline)
        shell: bash
        run: |
          export OPENMIND_DATA_DIR="$(mktemp -d)"
          export OPENMIND_MACHINE_DIR="$(mktemp -d)"
          python - <<'PY'
          import json, os, pathlib, tempfile
          from openmind.runtime import get_runtime
          from openmind.semantic.models import ProviderProfile
          from openmind.semantic.providers import profiles
          from openmind.semantic.providers.mock_provider import RECORDED_REQUESTS

          rt = get_runtime()
          pid = rt.workspaces.create("ci-semantic")["id"]
          src = pathlib.Path(tempfile.mkdtemp())
          doc = src / "requirements.md"
          doc.write_text("# Reqs\n\nREQ-CI-001: The job shall finish.\n",
                         encoding="utf-8")
          assert rt.documents.add_document(
              pid, str(doc), wait=True, timeout=300)["status"] == "new_asset"

          # machine-local provider profile (never a key value on disk)
          from openmind import db
          from openmind.semantic.context import resolve_evidence_text
          evidence_id = None
          for a in db.list_assets(pid, limit=50):
              for s in db.list_segments(pid, a["current_revision_id"], limit=50):
                  ev = db.get_evidence_for_segment(pid, s["id"])
                  if ev and "shall finish" in (resolve_evidence_text(pid, ev["id"]) or ""):
                      evidence_id = ev["id"]
          assert evidence_id
          profiles.upsert_profile(ProviderProfile(
              name="ci-mock", kind="mock", metadata={"responses": {
                  "requirement-extraction": {"candidates": [{
                      "candidateType": "requirement", "stableKey": "REQ-CI-001",
                      "title": "Finish", "statement": "The job shall finish.",
                      "attributes": {},
                      "evidence": [{"evidenceId": evidence_id,
                                    "quote": "The job shall finish."}],
                      "confidenceHint": "medium", "reason": "normative"}]}}}))
          assert profiles.providers_file().is_file()

          sem = rt.semantic
          sem.set_policy(pid, provider_profile="ci-mock")
          run = sem.start_analysis(pid, task_types=["requirement-extraction"],
                                   wait=True, timeout=300)["run"]
          assert run["status"] == "done", run
          cands = sem.list_candidates(pid, candidate_type="requirement")
          assert cands["total"] == 1 and \
              cands["candidates"][0]["evidence_status"] == "verified"

          # exact cache hit: zero further provider calls
          before = len(RECORDED_REQUESTS)
          run2 = sem.start_analysis(pid, task_types=["requirement-extraction"],
                                    wait=True, timeout=300)["run"]
          assert len(RECORDED_REQUESTS) == before, "cache hit must call nothing"
          assert run2["summary"]["counters"]["cache_hits"] >= 1

          # staleness after a new revision
          cid = cands["candidates"][0]["id"]
          doc.write_text(doc.read_text(encoding="utf-8") + "\nMore.\n",
                         encoding="utf-8")
          aid = rt.documents.list_documents(pid)["documents"][0]["id"]
          rt.documents.add_document(pid, str(doc), asset_id=aid,
                                    wait=True, timeout=300)
          assert sem.get_candidate(pid, cid)["lifecycle_status"] == "stale"

          # Built-in Lens projection + organization lens validation
          lenses = rt.lenses
          builtin = [l for l in lenses.list_lenses(pid)["lenses"]
                     if l["source"] == "builtin"]
          assert builtin, "expected Template projections"
          import openmind.config as config
          lens_dir = config.DATA_DIR / "lenses"
          lens_dir.mkdir(parents=True, exist_ok=True)
          (lens_dir / "ci-org.json").write_text(json.dumps({
              "schemaVersion": "2.0.0", "name": "ci-org",
              "description": "ci lens",
              "roles": [{"name": "docs", "pathGlobs": ["*.md"],
                          "namePatterns": [], "annotations": []}]}),
              encoding="utf-8")
          org = [l for l in lenses.list_lenses(pid, source="organization")
                 ["lenses"] if l["name"] == "ci-org"]
          assert org and org[0]["validation"]["result"] == "valid", org
          print("semantic smoke OK: candidate persisted + verified, cache "
                "hit, staleness, lenses")
          PY

      # -- knowledge graph smoke (v2 Phase 5) -----------------------------
      # The whole promotion chain on every OS: deterministic seed, a mock
      # candidate confirmed and EXPLICITLY promoted, entity/claim/relation
      # lookup, a bounded graph path, and a Bundle 2.0 Draft export that
      # the standalone verifier accepts. Zero network, zero credentials.
      - name: Knowledge graph smoke (seed, promote, path, bundle)
        shell: bash
        run: |
          export OPENMIND_DATA_DIR="$(mktemp -d)"
          export OPENMIND_MACHINE_DIR="$(mktemp -d)"
          python - <<'PY'
          import pathlib, subprocess, sys, tempfile
          from openmind.runtime import get_runtime
          from openmind.semantic.models import ProviderProfile
          from openmind.semantic.providers import profiles

          rt = get_runtime()
          pid = rt.workspaces.create("ci-knowledge")["id"]
          src = pathlib.Path(tempfile.mkdtemp())
          doc = src / "requirements.md"
          doc.write_text("# Reqs\n\nREQ-CI-001: The job shall finish.\n",
                         encoding="utf-8")
          assert rt.documents.add_document(
              pid, str(doc), wait=True, timeout=300)["status"] == "new_asset"

          # deterministic seed: model-free, one knowledge revision
          seed = rt.knowledge.seed(pid, actor="ci")
          assert seed["changed"] and seed["knowledge_revision"] == 1, seed
          assert rt.knowledge.sync(pid)["action"] == "noop"

          # a mock candidate, confirmed, then EXPLICITLY promoted
          from openmind import db
          from openmind.semantic.context import resolve_evidence_text
          evidence_id = None
          for a in db.list_assets(pid, limit=50):
              for s in db.list_segments(pid, a["current_revision_id"],
                                        limit=50):
                  ev = db.get_evidence_for_segment(pid, s["id"])
                  if ev and "shall finish" in (
                          resolve_evidence_text(pid, ev["id"]) or ""):
                      evidence_id = ev["id"]
          assert evidence_id
          profiles.upsert_profile(ProviderProfile(
              name="ci-mock", kind="mock", metadata={"responses": {
                  "requirement-extraction": {"candidates": [{
                      "candidateType": "requirement",
                      "stableKey": "REQ-CI-001", "title": "Finish",
                      "statement": "The job shall finish.",
                      "attributes": {},
                      "evidence": [{"evidenceId": evidence_id,
                                    "quote": "The job shall finish."}],
                      "confidenceHint": "medium", "reason": "normative"}]}}}))
          rt.semantic.set_policy(pid, provider_profile="ci-mock")
          rt.semantic.start_analysis(
              pid, task_types=["requirement-extraction"], wait=True,
              timeout=300)
          cid = rt.semantic.list_candidates(
              pid, candidate_type="requirement")["candidates"][0]["id"]
          # confirming is review metadata only — promotion is separate
          rt.semantic.review_candidate(pid, cid, decision="confirm",
                                       reviewer="ci")
          from openmind.knowledge import store as kg
          assert kg.count_entities(
              pid, entity_type="requirement") == 0, "review must not promote"
          promoted = rt.knowledge.promote_candidate(
              pid, cid, actor="ci", note="ci promotion")
          assert promoted["status"] == "promoted", promoted
          entity_id = promoted["entity"]["id"]
          claim_id = promoted["claim"]["id"]

          # lookups + a manual relation + a bounded path
          assert rt.knowledge.get_entity(pid, entity_id)["canonical_key"] \
              == "requirement:REQ-CI-001"
          assert rt.knowledge.get_claim(pid, claim_id)["evidence"]
          doc_entities = [e for e in rt.knowledge.list_entities(
              pid, entity_type="document")["entities"]]
          assert doc_entities, "seed should have projected the document"
          relation = rt.knowledge.create_relation(
              pid, source_entity_id=entity_id,
              target_entity_id=doc_entities[0]["id"],
              relation_type="derived-from", relation_state="confirmed",
              evidence=[{"evidence_id": evidence_id}],
              actor="ci", note="ci relation")["relation"]
          assert rt.knowledge.get_relation(
              pid, relation["id"])["relation_state"] == "confirmed"
          path = rt.knowledge.find_path(pid, entity_id,
                                        doc_entities[0]["id"])
          assert path["outcome"] == "found", path

          # bundle export + standalone verification
          out = pathlib.Path(tempfile.mkdtemp()) / "bundle"
          from openmind.knowledge.bundle import export_bundle
          manifest = export_bundle(pid, str(out), current_only=True)
          assert manifest["bundleSchemaVersion"] == "2.0.0-draft.1"
          verdict = subprocess.run(
              [sys.executable, "-m", "openmind.bundle_verify", str(out)],
              capture_output=True, text=True)
          assert verdict.returncode == 0, verdict.stdout + verdict.stderr
          print("knowledge smoke OK: seed -> promote -> path -> bundle "
                "verified at revision",
                rt.knowledge.get_current_revision(pid)["knowledge_revision"])
          PY

      - name: CLI asset help + fixture ingest + asset list + evidence read
        shell: bash
        run: |
          export OPENMIND_DATA_DIR="$(mktemp -d)"
          export OPENMIND_MACHINE_DIR="$(mktemp -d)"
          python -m openmind.cli asset --help > /dev/null
          python -m openmind.cli asset list --help > /dev/null
          WS=$(python -m openmind.cli init --name smoke --path ./fixtures/sample-repo \
                --ingest --wait --json | python -c "import json,sys; print(json.load(sys.stdin)['workspace_id'])")
          # Small fixture ingest -> asset list -> resolve a revision/segment/evidence
          # id chain -> read historical evidence back from the immutable snapshot.
          OM_WS="$WS" python - <<'PY'
          import json, os, subprocess, sys
          ws = os.environ["OM_WS"]
          def cli(*args):
              return json.loads(subprocess.check_output(
                  [sys.executable, "-m", "openmind.cli", *args]))
          data = cli("asset", "list", "--workspace", ws, "--json")
          assert data["ok"] and data["total"] >= 1, data
          # This step proves the CODE asset chain, so pick a code asset
          # explicitly. Since v2 Phase 3 the fixture's README.md and
          # docs/GLOSSARY.md are also ingested (as DOCUMENT assets), and they
          # sort first — taking assets[0] would silently retarget this check.
          code = [a for a in data["assets"] if a["asset_type"] == "source-code"]
          assert code, data
          aid = code[0]["id"]
          show = cli("asset", "show", "--workspace", ws, "--asset", aid, "--json")
          rid = show["asset"]["current_revision"]["id"]
          segs = cli("asset", "segments", "--workspace", ws, "--revision", rid, "--json")
          eid = segs["segments"][0]["evidence_id"]
          ev = cli("asset", "evidence", "--workspace", ws, "--evidence", eid, "--json")
          assert ev["snapshot"]["status"] == "available", ev
          assert ev["locator"]["kind"] == "source-range", ev
          assert not ev["locator"]["file"].startswith("/"), ev

          # The portable-key rule holds for EVERY asset, whichever locator kind
          # it uses: a code locator names its target in `file`, a document
          # locator in `document`, and neither may ever be absolute.
          for asset in data["assets"]:
              rev = cli("asset", "show", "--workspace", ws,
                        "--asset", asset["id"], "--json")["asset"]
              current = rev.get("current_revision")
              if not current:
                  continue
              seg = cli("asset", "segments", "--workspace", ws,
                        "--revision", current["id"], "--limit", "1", "--json")
              evidence_id = seg["segments"][0]["evidence_id"]
              locator = cli("asset", "evidence", "--workspace", ws,
                            "--evidence", evidence_id, "--json")["locator"]
              key = locator.get("file") or locator.get("document") or ""
              assert key, (asset["logical_key"], locator)
              assert not key.startswith("/") and ":" not in key[:3], \
                  (asset["logical_key"], locator)
          print("asset CLI smoke OK:", data["total"], "assets, evidence snapshot",
                ev["snapshot"]["status"])
          PY

      # -- document ingestion smoke (v2 Phase 3) --------------------------
      # One document of each shape that matters on every OS: a text format, a
      # ZIP-based OOXML format, a binary format with its own extractor, and a
      # spreadsheet. Then list, outline and search, so the whole chain from
      # bytes to a citable hit is proven cross-platform.
      - name: Document ingestion (Markdown, DOCX, PDF, XLSX) + list/outline/search
        shell: bash
        run: |
          export OPENMIND_DATA_DIR="$(mktemp -d)"
          export OPENMIND_MACHINE_DIR="$(mktemp -d)"
          python -m openmind.cli document --help > /dev/null
          WS=$(python -m openmind.cli init --name docsmoke --json \
                | python -c "import json,sys; print(json.load(sys.stdin)['workspace_id'])")
          OM_WS="$WS" python - <<'PY'
          import json, os, subprocess, sys
          ws = os.environ["OM_WS"]
          def cli(*args):
              out = subprocess.check_output(
                  [sys.executable, "-m", "openmind.cli", *args, "--json"])
              return json.loads(out)

          expected = {
              "sample-requirements.md": ("markdown", "parsed"),
              "sample-requirements.docx": ("docx", "parsed"),
              "sample-design.pdf": ("pdf", "parsed"),
              "sample-tests.xlsx": ("xlsx", "parsed"),
              "sample-scanned.pdf": ("pdf", "needs-ocr"),
          }
          revision = None
          for name, (parser, status) in expected.items():
              result = cli("document", "add", "--workspace", ws,
                           "--path", f"./fixtures/documents/{name}", "--wait")
              report = result["import_report"]
              assert report["parser"] == parser, (name, report["parser"])
              assert report["parse_status"] == status, (name, report)
              if name == "sample-requirements.md":
                  revision = report["revision_id"]
                  assert report["segments_created"] > 0, report
                  assert report["blocks_indexed"] > 0, report
              # An image-only PDF must be detected, and must NOT claim OCR ran.
              if status == "needs-ocr":
                  assert report["revision_created"] is False, report
                  assert not report.get("blocks_indexed"), report

          listing = cli("document", "list", "--workspace", ws)
          assert listing["total"] >= 4, listing
          parsers = {d["document"]["parser_name"] for d in listing["documents"]}
          assert {"markdown", "docx", "pdf", "xlsx"} <= parsers, parsers

          outline = cli("document", "outline", "--workspace", ws,
                        "--revision", revision, "--limit", "5")
          assert outline["count"] == 5 and outline["total"] > 5, outline
          assert all(e["evidence_id"] for e in outline["outline"]), outline

          hits = cli("document", "search", "--workspace", ws,
                     "--query", "REQ-NC-017")
          assert hits["count"] > 0, hits
          assert hits["query_mode"] == "exact_token", hits
          assert all(h["evidence_id"] for h in hits["hits"]), hits
          # The locator must be portable: no absolute path may appear.
          assert not any(h["locator"].get("document", "").startswith("/")
                         for h in hits["hits"]), hits
          print("document smoke OK:", listing["total"], "documents,",
                hits["count"], "hits for REQ-NC-017")
          PY

      - name: Skill bridge startup
        shell: bash
        run: |
          python - <<'PY'
          import json, subprocess, sys
          proc = subprocess.Popen(
              [sys.executable, "-m", "openmind.skill_bridge",
               "--root", "./fixtures/sample-repo"],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, text=True, bufsize=1)
          try:
              ready = json.loads(proc.stdout.readline())
              assert ready.get("ready") is True, ready
              print("skill bridge startup OK:", ready["files"], "files")
          finally:
              proc.stdin.close()
              proc.wait(timeout=30)
          PY

  # ---------------------------------------------------------------------------
  # Optional: run the independent Agent Skill Verification Template against the
  # REAL OpenMind implementation via the skill bridge.
  #
  # This job never downloads an unpinned repository. It runs only when the
  # template is provided deliberately, through the AGENT_SKILL_VERIFICATION_REF
  # repository variable in explicit 'owner/repo@ref' form. Without it the job
  # reports "not configured" and does NOT claim the verification ran.
  #
  # A future phase will use Agent Skill Forge to generate the v2 workflow
  # Skills; this job is the seam for running them, not those Skills.
  # ---------------------------------------------------------------------------
  skill-verification:
    name: Agent Skill Verification (optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - name: Checkout OpenMind
        uses: actions/checkout@v4
        with:
          path: open-mind

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: open-mind/requirements.txt

      - name: Install dependencies
        working-directory: open-mind
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check out the verification template (pinned ref only)
        id: template
        env:
          TEMPLATE_REF: ${{ vars.AGENT_SKILL_VERIFICATION_REF }}
        run: |
          if [ -z "${TEMPLATE_REF}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "AGENT_SKILL_VERIFICATION_REF is not set."
            echo "Set it to 'owner/repo@ref' to enable this job."
            exit 0
          fi
          repo="${TEMPLATE_REF%@*}"
          ref="${TEMPLATE_REF##*@}"
          if [ "${repo}" = "${ref}" ]; then
            echo "::error::AGENT_SKILL_VERIFICATION_REF must be 'owner/repo@ref' (a pinned ref); got '${TEMPLATE_REF}'."
            exit 1
          fi
          git clone --filter=blob:none --no-checkout "https://github.com/${repo}.git" template
          git -C template fetch --depth 1 origin "${ref}"
          git -C template checkout FETCH_HEAD
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Report that verification is not configured
        if: steps.template.outputs.available != 'true'
        run: |
          echo "Agent Skill Verification did NOT run (template not configured)."
          echo "This step is a no-op, NOT a pass for the skill suite."

      - name: Run the verification suite against the real implementation
        if: steps.template.outputs.available == 'true'
        working-directory: template
        env:
          OPENMIND_ROOT: ${{ github.workspace }}/open-mind
        run: |
          npm ci
          npm run eval:openmind
